name: 🚀 Build & Push First ---> backend-cart-order-service image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # ==============================
      # 📥 Checkout Repository
      # ==============================
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      # ==============================
      # 🔐 Docker Login
      # ==============================
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==============================
      # 🧠 Show Info
      # ==============================
      - name: 🧠 Show Build Info
        run: |
          echo "🚀 Starting Docker Build for Cart Service"
          echo "📦 Image: pythoncodelife/backend-cart-order-service:latest"
          echo "🕒 Time: $(date)"

      # ==============================
      # 🐳 Build Docker Image
      # ==============================
      - name: 🐳 Build Docker Image
        run: |
          docker build -t pythoncodelife/backend-cart-order-service:latest .

      # ==============================
      # 📤 Push Docker Image
      # ==============================
      - name: 📤 Push Docker Image
        run: |
          docker push pythoncodelife/backend-cart-order-service:latest

      # ==============================
      # 🔍 Verify Image
      # ==============================
      - name: 🔍 Verify Image Push
        run: |
          echo "✅ Image pushed successfully!"
          echo "🔗 DockerHub: https://hub.docker.com/r/pythoncodelife/backend-cart-order-service"
      
      # ==============================
      # 🎉 Done
      # ==============================
      - name: 🎉 Done
        run: |
          echo "🚀 backend-cart-order-service Docker Image Ready for Deployment"
